<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Details</title>
</head>
<body>

<h1>Product Details</h1>
<p>Product ID: <span id="productId">*{productId}</span></p>
<p>Name: <span id="productName">*{productName}</span></p>
<p>Price: <span id="productQuantity">*{productQuantity}</span></p>

<form id="deleteProductForm" action="/product/*{productName}" method="POST">
  <input type="hidden" id="productIdInput" name="productId" value="123">
  <button type="submit" onclick="return confirm('Are you sure you want to delete this product?')">Delete Product</button>
</form>

</body>
</html>
